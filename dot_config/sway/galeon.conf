set $bg $home/.config/sway/background/gelateria.png

input type:pointer {
    accel_profile "flat"
}

set $out_1 DP-1
set $out_2 HDMI-A-1

output $out_1 pos 0 0 res 1920x1080@60Hz
output $out_2 pos 1920 0 res 1920x1080@120.000Hz transform 90

workspace 1 output $out_1
workspace 2 output $out_1
workspace 3 output $out_1
workspace 4 output $out_1
workspace 5 output $out_1

workspace 6 output $out_2
workspace 7 output $out_2
workspace 8 output $out_2
workspace 9 output $out_2
workspace 10 output $out_2

